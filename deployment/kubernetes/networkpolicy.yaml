apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: edt-network-policy
  namespace: enterprise-digital-twin
  labels:
    app.kubernetes.io/name: enterprise-digital-twin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: enterprise-digital-twin
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS egress to managed services / model registry.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443