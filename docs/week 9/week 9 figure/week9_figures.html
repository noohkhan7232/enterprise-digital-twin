<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 9 — Enterprise Digital Twin & Decision Intelligence Platform</title>
<style>
  :root {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: rgba(11,11,11,0.10);
    --border-strong: rgba(11,11,11,0.18);
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --accent: #2a78d6;
    --accent-bg: #e6f1fb;
    --accent-text: #0c447c;
    --purple: #534ab7;
    --purple-bg: #eeedfe;
    --purple-text: #3c3489;
    --teal: #1d9e75;
    --teal-bg: #e1f5ee;
    --teal-text: #085041;
    --coral: #d85a30;
    --coral-bg: #faece7;
    --coral-text: #712b13;
    --amber: #ba7517;
    --amber-bg: #faeeda;
    --amber-text: #633806;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1a1a19;
      --surface2: #222221;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.18);
      --text-primary: #f0efe8;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --accent: #3987e5;
      --accent-bg: #042c53;
      --accent-text: #b5d4f4;
      --purple: #9085e9;
      --purple-bg: #26215c;
      --purple-text: #cecbf6;
      --teal: #1d9e75;
      --teal-bg: #04342c;
      --teal-text: #9fe1cb;
      --coral: #d85a30;
      --coral-bg: #4a1b0c;
      --coral-text: #f0997b;
      --amber: #ef9f27;
      --amber-bg: #412402;
      --amber-text: #fac775;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Nav */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border-strong);
    padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    height: 52px;
    overflow-x: auto;
  }
  .nav-logo {
    font-size: 13px; font-weight: 500;
    color: var(--text-muted);
    white-space: nowrap;
    padding-right: 16px;
    border-right: 0.5px solid var(--border-strong);
  }
  .nav-tabs {
    display: flex; gap: 4px;
    overflow-x: auto;
  }
  .nav-tab {
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    color: var(--text-secondary);
    border: none; background: transparent;
    transition: background 0.15s;
  }
  .nav-tab:hover { background: var(--accent-bg); color: var(--accent-text); }
  .nav-tab.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }

  /* Pages */
  .page { display: none; padding: 40px 24px; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* Figure Card */
  .fig-card {
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 32px;
  }
  .fig-meta {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
  }
  .fig-number {
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    color: var(--accent-text);
    background: var(--accent-bg);
    padding: 3px 10px; border-radius: 99px;
    white-space: nowrap;
  }
  .fig-title {
    font-size: 18px; font-weight: 500;
    color: var(--text-primary);
    flex: 1;
  }
  .fig-objective {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .fig-body { margin-bottom: 24px; }
  .fig-interp {
    background: var(--surface2);
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 20px;
  }
  .fig-interp strong { color: var(--text-primary); font-weight: 500; }

  /* SVG shared */
  svg { display: block; width: 100%; }

  /* Grid helpers for some figs */
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin: 16px 0;
  }
  .metric-card {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 500; color: var(--text-primary); }
  .metric-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  /* Legend */
  .legend {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin: 12px 0 4px;
    font-size: 12px; color: var(--text-secondary);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Heatmap cell */
  .heatmap-wrap { overflow-x: auto; }
  table.heatmap {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
  }
  table.heatmap th {
    padding: 8px 10px;
    text-align: left;
    font-weight: 500;
    color: var(--text-secondary);
    border-bottom: 0.5px solid var(--border-strong);
  }
  table.heatmap td {
    padding: 8px 10px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text-primary);
  }
  .heat-cell {
    display: flex; align-items: center; gap: 8px;
  }
  .heat-bar {
    height: 14px; border-radius: 2px;
    min-width: 4px;
  }

  /* Radar chart canvas */
  .chart-wrap { position: relative; width: 100%; height: 340px; }

  /* Citation graph styles */
  .cg-node {
    cursor: pointer;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .fig-card { padding: 20px 16px; }
    .nav { padding: 0 12px; }
    .page { padding: 20px 12px; }
  }
</style>
</head>
<body>

<!-- Navigation -->
<nav class="nav">
  <div class="nav-logo">Week 9 · Decision Intelligence</div>
  <div class="nav-tabs" id="navTabs"></div>
</nav>

<!-- Pages will be injected -->
<div id="pages"></div>

<script>
// ─────────────────────────────────────────────
// DATA: figure specs
// ─────────────────────────────────────────────
const figures = [
  {
    num: 1, title: "Master Architecture Poster — Knowledge Intelligence Stack",
    objective: "Present the complete Enterprise Digital Twin & Decision Intelligence Platform across all layers from raw data ingestion to executive decision output.",
    interp: "This master view establishes the full system boundary. Executives see the platform as five interlocking zones; engineers see the precise handoff contracts between layers. Every subsequent figure zooms into one region of this poster.",
    svg: `masterArch`
  },
  {
    num: 2, title: "Knowledge Intelligence Layer",
    objective: "Trace the vertical processing chain from the static Knowledge Base through to the Executive Copilot, illustrating information transformation at each stage.",
    interp: "Five stages transform dormant documents into grounded executive intelligence. The handoff at each arrow represents a quality gate — retrieval quality determines response quality.",
    svg: `knowledgeLayer`
  },
  {
    num: 3, title: "Enterprise Knowledge Base Architecture",
    objective: "Decompose the knowledge base into its six structural subsystems and show their interdependencies.",
    interp: "The knowledge base is not a flat file store. Its six subsystems enforce data quality (Validation), discoverability (Registry, Metadata), and operational awareness (Statistics) before any document enters retrieval.",

  },
  {
    num: 4, title: "Knowledge Document Lifecycle",
    objective: "Map the complete state machine of a document from initial creation through archival, capturing every transition trigger.",
    interp: "Documents are long-lived enterprise assets. The lifecycle diagram governs data retention policy, audit compliance, and retrieval freshness. Archival is not deletion — it signals a managed state change.",
    svg: `docLifecycle`
  },
  {
    num: 5, title: "Vector Embedding Pipeline",
    objective: "Illustrate how raw documents are transformed into normalised vector representations ready for similarity search.",
    interp: "Each stage reduces raw entropy: hashing collapses vocabulary; embedding projects to semantic geometry; normalization ensures cosine distance is meaningful. A broken pipeline at any stage silently degrades retrieval precision.",
    svg: `vectorPipeline`
  },
  {
    num: 6, title: "Vector Search Architecture",
    objective: "Show the internal structure of the vector search engine from index to ranked result delivery.",
    interp: "Approximate Nearest Neighbour search makes retrieval sub-linear in corpus size. The similarity engine is the performance bottleneck; hybrid search and ranking are the quality levers.",
    svg: `vectorSearch`
  },
  {
    num: 7, title: "Similarity Metrics Comparison",
    objective: "Compare cosine, Euclidean, and dot-product similarity metrics across accuracy, computational cost, and use-case fit.",
    interp: "Metric choice is a design decision with real performance consequences. Cosine dominates NLP tasks; Euclidean is preferred for dense numeric embeddings; dot product maximises retrieval speed when vectors are pre-normalised.",
    svg: `similarityMetrics`
  },
  {
    num: 8, title: "Hybrid Retrieval Pipeline",
    objective: "Illustrate how keyword and vector search signals are fused and reranked to produce top-K results superior to either alone.",
    interp: "Neither keyword nor semantic search is sufficient alone. Score fusion combines BM25 precision with embedding recall. The top-K gate enforces the latency budget while preserving evidence diversity.",
    svg: `hybridRetrieval`
  },
  {
    num: 9, title: "Retrieval Intelligence Architecture",
    objective: "Detail the six-stage retrieval intelligence pipeline from raw query normalisation to a structured evidence package.",
    interp: "Retrieval intelligence is the brain of the platform. Normalisation handles linguistic variance; filtering removes irrelevant candidates early; ranking applies multi-factor scoring. The output is not a list — it is a structured evidence package with provenance metadata.",
    svg: `retrievalArch`
  },
  {
    num: 10, title: "Evidence Ranking Heatmap",
    objective: "Visualise how candidate documents score across multiple ranking factors using a colour-coded heatmap.",
    interp: "The heatmap exposes ranking transparency. Decision-makers can audit why a specific document ranked first. It also reveals data quality gaps: a column of low scores signals a systematic metadata deficiency.",
    svg: `evidenceHeatmap`
  },
  {
    num: 11, title: "Knowledge Agent Pipeline",
    objective: "Trace the six-stage knowledge agent workflow from incoming question to a grounded, cited response.",
    interp: "The knowledge agent is the system's primary reasoning engine. Classification routes queries to the right retrieval strategy. Grounded response generation ensures every claim is evidence-backed before citation assembly.",
    svg: `knowledgeAgent`
  },
  {
    num: 12, title: "Confidence Calculation Architecture",
    objective: "Show how four independent quality signals are aggregated into a single calibrated confidence score.",
    interp: "Confidence is not a black box. Each contributing factor has an independent audit trail. Low confidence triggers a human-in-the-loop escalation pathway rather than presenting uncertain conclusions as fact.",
    svg: `confidenceCalc`
  },
  {
    num: 13, title: "Executive Copilot Pipeline",
    objective: "Map the end-to-end transformation from an executive natural-language question to a structured executive briefing.",
    interp: "The copilot layer translates technical retrieval outputs into business language. Its value is not raw data — it is packaged intelligence with explicit risk flags, actionable recommendations, and cited evidence.",
    svg: `execCopilot`
  },
  {
    num: 14, title: "Executive Briefing Structure",
    objective: "Define the seven mandatory sections of a compliant executive briefing document.",
    interp: "Structure enforces accountability. Every briefing produced by the platform must carry all seven sections — omitting Limitations or Confidence triggers a compliance alert before delivery.",
    svg: `execBriefing`
  },
  {
    num: 15, title: "Citation Traceability Graph",
    objective: "Illustrate the directed acyclic graph linking executive responses back to source documents through evidence and citation nodes.",
    interp: "Citation traceability is the platform's audit capability. Every claim in an executive briefing carries a chain of custody back to a source document. Regulators and auditors can replay any decision path.",
    svg: `citationGraph`
  },
  {
    num: 16, title: "Enterprise Decision Intelligence Flow",
    objective: "Show the full bidirectional information flow between an executive user and the underlying knowledge infrastructure.",
    interp: "Decision intelligence is a closed loop. Questions flow down through six layers; intelligence flows back up as structured, cited briefings. Latency at any layer degrades executive experience.",
    svg: `decisionFlow`
  },
  {
    num: 17, title: "Week 8 vs Week 9 — Capability Radar",
    objective: "Compare the platform capability profile before and after Week 9's knowledge intelligence additions using a six-axis radar chart.",
    interp: "Week 9 dramatically expands the Knowledge Intelligence and Executive Copilot axes while preserving the Week 8 core. The area increase quantifies the Week 9 engineering investment.",
    svg: `capabilityRadar`
  },
  {
    num: 18, title: "Enterprise Capability Maturity Model",
    objective: "Map the platform's progression through five maturity levels from Digital Twin foundation to full Executive AI Platform.",
    interp: "Maturity level defines the platform's strategic value to the enterprise. Week 9 advances the platform from Agentic AI (level 3) to Knowledge Intelligence (level 4), within one step of the Executive AI Platform ceiling.",
    svg: `maturityModel`
  },
  {
    num: 19, title: "Technology Stack Poster",
    objective: "Present the full technology stack across seven horizontal layers from runtime to testing.",
    interp: "The stack is intentionally shallow in external dependencies — Python, NumPy, and a custom retrieval library. This reduces vendor lock-in and gives the enterprise full visibility into every component in the decision path.",
    svg: `techStack`
  },
  {
    num: 20, title: "Week 9 Flagship Poster",
    objective: "One-page synthesis of every Week 9 component, suitable for GitHub README, LinkedIn, IEEE conference poster, and portfolio homepage.",
    interp: "This flagship poster is the platform's public face. It communicates architectural sophistication, production readiness, and research novelty in a single scannable frame.",
    svg: `flagshipPoster`
  }
];

// ─────────────────────────────────────────────
// SVG RENDERERS
// ─────────────────────────────────────────────
const ARROW_DEFS = `<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

function svgWrap(h, content, title, desc) {
  return `<svg width="100%" viewBox="0 0 840 ${h}" role="img" xmlns="http://www.w3.org/2000/svg">
<title>${title}</title><desc>${desc}</desc>
${ARROW_DEFS}
${content}
</svg>`;
}

// Colour palette (hardcoded for SVG compatibility)
const C = {
  // Purple ramp
  p50:'#EEEDFE', p100:'#CECBF6', p200:'#AFA9EC', p400:'#7F77DD', p600:'#534AB7', p800:'#3C3489', p900:'#26215C',
  // Teal ramp
  t50:'#E1F5EE', t100:'#9FE1CB', t200:'#5DCAA5', t400:'#1D9E75', t600:'#0F6E56', t800:'#085041', t900:'#04342C',
  // Blue ramp
  b50:'#E6F1FB', b100:'#B5D4F4', b200:'#85B7EB', b400:'#378ADD', b600:'#185FA5', b800:'#0C447C', b900:'#042C53',
  // Coral ramp
  o50:'#FAECE7', o100:'#F5C4B3', o200:'#F0997B', o400:'#D85A30', o600:'#993C1D', o800:'#712B13', o900:'#4A1B0C',
  // Amber ramp
  a50:'#FAEEDA', a100:'#FAC775', a200:'#EF9F27', a400:'#BA7517', a600:'#854F0B', a800:'#633806', a900:'#412402',
  // Gray
  g50:'#F1EFE8', g100:'#D3D1C7', g200:'#B4B2A9', g400:'#888780', g600:'#5F5E5A', g800:'#444441', g900:'#2C2C2A',
  // Pink
  k50:'#FBEAF0', k100:'#F4C0D1', k400:'#D4537E', k600:'#993556', k800:'#72243E',
};

// ── F1: Master Architecture ──────────────────
function masterArch() {
  const layers = [
    { label:'Executive Layer', sub:'Copilot · Briefing · Recommendations', fill:C.p50, stroke:C.p600, text:C.p900 },
    { label:'Knowledge Agent Layer', sub:'Classification · Grounding · Citation', fill:C.b50, stroke:C.b600, text:C.b900 },
    { label:'Retrieval Intelligence Layer', sub:'Query norm · Candidate gen · Ranking', fill:C.t50, stroke:C.t600, text:C.t900 },
    { label:'Vector Search Layer', sub:'Embedding · Index · Hybrid search', fill:C.a50, stroke:C.a600, text:C.a900 },
    { label:'Knowledge Base Layer', sub:'Documents · Registry · Validation', fill:C.o50, stroke:C.o600, text:C.o900 },
    { label:'Enterprise Data Sources', sub:'Reports · Policies · Research · Logs', fill:C.g50, stroke:C.g400, text:C.g900 },
  ];
  let rows = '';
  const lh = 74; const gap = 12; const sx = 60; const sw = 720;
  layers.forEach((l, i) => {
    const y = 40 + i*(lh+gap);
    rows += `<rect x="${sx}" y="${y}" width="${sw}" height="${lh}" rx="10" fill="${l.fill}" stroke="${l.stroke}" stroke-width="0.5"/>`;
    rows += `<text font-family="-apple-system,sans-serif" font-size="14" font-weight="500" fill="${l.text}" x="${sx+24}" y="${y+28}">${l.label}</text>`;
    rows += `<text font-family="-apple-system,sans-serif" font-size="12" fill="${l.stroke}" x="${sx+24}" y="${y+50}">${l.sub}</text>`;
    // right badge
    const badge = ['F14', 'F11·F12', 'F9·F10', 'F5·F6·F7·F8', 'F3·F4', 'Sources'][i];
    rows += `<text font-family="-apple-system,sans-serif" font-size="11" fill="${l.stroke}" text-anchor="end" x="${sx+sw-16}" y="${y+44}">${badge}</text>`;
    // connector arrow
    if (i < layers.length-1) {
      const ay = y+lh+2;
      rows += `<line x1="${sx+sw/2}" y1="${ay}" x2="${sx+sw/2}" y2="${ay+gap-2}" stroke="${l.stroke}" stroke-width="1" marker-end="url(#arrow)"/>`;
    }
  });
  // Side labels
  rows += `<text font-family="-apple-system,sans-serif" font-size="10" fill="${C.g600}" text-anchor="middle" transform="rotate(-90,22,${40+2.5*(lh+gap)+lh/2})">INTELLIGENCE STACK</text>`;
  return svgWrap(620, rows, 'Master Architecture', 'Six-layer knowledge intelligence stack');
}

// ── F2: Knowledge Intelligence Layer ─────────
function knowledgeLayer() {
  const stages = [
    { label:'Knowledge Base', sub:'Documents, metadata, registry', fill:C.o50, stroke:C.o600, text:C.o900 },
    { label:'Vector Search', sub:'Embedding index, similarity engine', fill:C.a50, stroke:C.a600, text:C.a900 },
    { label:'Retrieval Intelligence', sub:'Query norm, filtering, ranking', fill:C.t50, stroke:C.t600, text:C.t900 },
    { label:'Knowledge Agent', sub:'Classification, grounding, citation', fill:C.b50, stroke:C.b600, text:C.b900 },
    { label:'Executive Copilot', sub:'Insights, recommendations, briefing', fill:C.p50, stroke:C.p600, text:C.p900 },
  ];
  let out = '';
  const bw=360; const bh=68; const bx=240; const gap=24;
  stages.forEach((s,i) => {
    const y = 30 + i*(bh+gap);
    out += `<rect x="${bx}" y="${y}" width="${bw}" height="${bh}" rx="10" fill="${s.fill}" stroke="${s.stroke}" stroke-width="0.5"/>`;
    out += `<text font-family="-apple-system,sans-serif" font-size="14" font-weight="500" fill="${s.text}" text-anchor="middle" x="${bx+bw/2}" y="${y+26}">${s.label}</text>`;
    out += `<text font-family="-apple-system,sans-serif" font-size="12" fill="${s.stroke}" text-anchor="middle" x="${bx+bw/2}" y="${y+48}">${s.sub}</text>`;
    if (i<stages.length-1) {
      const ay=y+bh+4;
      out += `<line x1="${bx+bw/2}" y1="${ay}" x2="${bx+bw/2}" y2="${ay+gap-8}" stroke="${s.stroke}" stroke-width="1.5" marker-end="url(#arrow)"/>`;
    }
    // side numbering
    out += `<text font-family="-apple-system,sans-serif" font-size="20" font-weight="500" fill="${s.stroke}" opacity="0.18" text-anchor="middle" x="${bx-36}" y="${y+bh/2+8}">${i+1}</text>`;
  });
  return svgWrap(560, out, 'Knowledge Intelligence Layer', 'Five-stage knowledge pipeline');
}

// ── F3: Knowledge Base Architecture ──────────
function kbArch() {
  // 6 subsystems arranged in 2x3 grid inside an outer container
  const subs = [
    { label:'Documents', sub:'Raw content store', fill:C.o50, stroke:C.o600, text:C.o900 },
    { label:'Collections', sub:'Logical groupings', fill:C.a50, stroke:C.a600, text:C.a900 },
    { label:'Registry', sub:'ID & lookup index', fill:C.t50, stroke:C.t600, text:C.t900 },
    { label:'Metadata', sub:'Schema & tags', fill:C.b50, stroke:C.b600, text:C.b900 },
    { label:'Validation', sub:'Quality enforcement', fill:C.p50, stroke:C.p600, text:C.p900 },
    { label:'Statistics', sub:'Corpus analytics', fill:C.k50, stroke:C.k600, text:C.k900 },
  ];
  let out='';
  // Outer container
  out += `<rect x="40" y="30" width="760" height="400" rx="16" fill="${C.g50}" stroke="${C.g400}" stroke-width="0.5"/>`;
  out += `<text font-family="-apple-system,sans-serif" font-size="13" font-weight="500" fill="${C.g800}" x="64" y="58">Enterprise Knowledge Base</text>`;
  // 2 rows × 3 cols
  const cols=3; const cw=220; const ch=130; const csx=60; const csy=76; const cgx=26; const cgy=24;
  subs.forEach((s,i) => {
    const col=i%cols; const row=Math.floor(i/cols);
    const x=csx+col*(cw+cgx); const y=csy+row*(ch+cgy);
    out += `<rect x="${x}" y="${y}" width="${cw}" height="${ch}" rx="10" fill="${s.fill}" stroke="${s.stroke}" stroke-width="0.5"/>`;
    out += `<text font-family="-apple-system,sans-serif" font-size="14" font-weight="500" fill="${s.text}" text-anchor="middle" x="${x+cw/2}" y="${y+48}">${s.label}</text>`;
    out += `<text font-family="-apple-system,sans-serif" font-size="12" fill="${s.stroke}" text-anchor="middle" x="${x+cw/2}" y="${y+72}">${s.sub}</text>`;
  });
  // horizontal connectors within rows
  [[0,1],[1,2],[3,4],[4,5]].forEach(([a,b]) => {
    const ac=a%cols; const ar=Math.floor(a/cols);
    const ax=csx+ac*(cw+cgx)+cw; const ay=csy+ar*(ch+cgy)+ch/2;
    const bx=csx+(b%cols)*(cw+cgx); const by=csy+Math.floor(b/cols)*(ch+cgy)+ch/2;
    out += `<line x1="${ax+2}" y1="${ay}" x2="${bx-2}" y2="${by}" stroke="${C.g400}" stroke-width="0.5" marker-end="url(#arrow)"/>`;
  });
  return svgWrap(460, out, 'Knowledge Base Architecture', 'Six subsystems of the enterprise knowledge base');
}

// ── F4: Document Lifecycle ────────────────────
function docLifecycle() {
  const stages = [
    { label:'Creation', sub:'Author submits content', fill:C.g50, stroke:C.g400, text:C.g900 },
    { label:'Validation', sub:'Schema & quality checks', fill:C.o50, stroke:C.o600, text:C.o900 },
    { label:'Registration', sub:'Assigned ID, entered registry', fill:C.a50, stroke:C.a600, text:C.a900 },
    { label:'Indexing', sub:'Vectorised & search-indexed', fill:C.t50, stroke:C.t600, text:C.t900 },

  const tab = document.createElement('button');
  tab.className = 'nav-tab' + (i===0?' active':'');
  tab.textContent = `F${f.num}`;
  tab.title = f.title;
  tab.onclick = () => showPage(i);
  navTabs.appendChild(tab);

  // Page
  const page = document.createElement('div');
  page.className = 'page' + (i===0?' active':'');
  page.id = `page-${i}`;

  const svgName = svgNames[i];
  let figBody = '';

  if (svgName === 'capabilityRadar') {
    figBody = buildRadar();
  } else {
    const fn = renderers[svgName];
    figBody = fn ? fn() : `<p style="color:var(--text-muted)">Figure pending</p>`;
  }

  page.innerHTML = `
    <div class="fig-card">
      <div class="fig-meta">
        <span class="fig-number">Figure ${f.num} of 20</span>
        <h2 class="fig-title">${f.title}</h2>
      </div>
      <p class="fig-objective"><strong>Objective:</strong> ${f.objective}</p>
      <div class="fig-body">${figBody}</div>
      <div class="fig-interp"><strong>Business interpretation:</strong> ${f.interp}</div>
    </div>
  `;
  pagesDiv.appendChild(page);
});

function showPage(idx) {
  document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i===idx));
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
}

// ─────────────────────────────────────────────
// F17: Radar chart (Chart.js)
// ─────────────────────────────────────────────
function buildRadar() {
  return `
<div class="legend" style="margin-bottom:12px">
  <span class="legend-item"><span class="legend-dot" style="background:#534AB7"></span>Week 9</span>
  <span class="legend-item"><span class="legend-dot" style="background:#888780;opacity:0.6"></span>Week 8</span>
</div>
<div class="chart-wrap"><canvas id="radarCanvas" role="img" aria-label="Radar chart comparing Week 8 and Week 9 platform capabilities across six axes">Capability comparison radar: Week 9 adds Knowledge Intelligence (9/10) and Executive Copilot (8/10) over Week 8 baseline.</canvas></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"><\/script>
<script>
(function() {
  function init() {
    if (!window.Chart) { setTimeout(init, 100); return; }
    new Chart(document.getElementById('radarCanvas'), {
      type: 'radar',
      data: {
        labels: ['Prediction','Simulation','Decision Intelligence','Agentic AI','Knowledge Intelligence','Executive Copilot'],
        datasets: [
          {
            label: 'Week 9',
            data: [8,7,9,8,9,8],
            borderColor: '#534AB7',
            backgroundColor: 'rgba(83,74,183,0.15)',
            borderWidth: 2,
            pointBackgroundColor: '#534AB7',
            pointRadius: 4
          },
          {
            label: 'Week 8',
            data: [8,7,8,7,3,2],
            borderColor: '#888780',
            backgroundColor: 'rgba(136,135,128,0.08)',
            borderWidth: 1.5,
            borderDash: [4,3],
            pointBackgroundColor: '#888780',
            pointRadius: 3
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            min: 0, max: 10,
            ticks: { stepSize: 2, font: { size: 11 }, color: '#898781', backdropColor: 'transparent' },
            grid: { color: 'rgba(136,135,128,0.2)' },
            pointLabels: { font: { size: 12 }, color: '#52514e' }
          }
        },
        plugins: { legend: { display: false } }
      }
    });
  }
  init();
})();
<\/script>`;
}
</script>
</body>
