apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edt-ingress
  namespace: enterprise-digital-twin
  labels:
    app.kubernetes.io/name: enterprise-digital-twin
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - edt.example.com
      secretName: edt-tls
  rules:
    - host: edt.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: edt-service
                port:
                  number: 80